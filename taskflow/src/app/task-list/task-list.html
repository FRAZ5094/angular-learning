<div class="flex flex-col gap-4">
  <h1 class="text-xl text-white font-medium">
    Pending: {{ pendingCount() }} completed: {{ completedCount() }}
  </h1>
  <div class="flex flex-col gap-4">
    @for (task of tasks(); track task.id) {
      <app-task-card [task]="task" (delete)="onDelete($event)" (toggle)="onToggle($event)" />
    } @empty {
      <h1 class="text-white text-xl font-medium">No tasks yet!</h1>
    }
    <button
      (click)="addTask()"
      class="text-white font-xl font-medium bg-slate-500 rounded-md p-4 hover:bg-slate-400 transition-colors"
    >
      Add task
    </button>
  </div>
</div>
