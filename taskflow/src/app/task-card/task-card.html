<div class="flex flex-row w-[500px] justify-between items-center gap-4 bg-slate-600 p-4 rounded-md">
  <div class="flex flex-col">
    <div class="flex flex-row gap-2">
      <h1 class="text-md font-medium text-white/90">{{ title() }}</h1>
      {{ priority() === 'high' ? '🔴' : '🟡' }}
    </div>
    <h2 class="text-sm text-white/60">{{ description() }}</h2>
  </div>
  <h2 (click)="toggleCompleted()" class="text-white text-sm cursor-pointer select-none">
    {{ statusLabel() }}
  </h2>
</div>
