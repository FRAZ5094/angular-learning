<div class="bg-white border border-gray-200 rounded-lg p-4 shadow-sm"
     [class.opacity-50]="task().completed">
  <div class="flex items-center justify-between mb-2">
    <h3 class="text-lg font-semibold text-gray-900">{{ task().title }}</h3>

    @switch (task().priority) {
      @case ('high') {
        <span class="text-sm px-2 py-1 rounded-full bg-red-100 text-red-700">High</span>
      }
      @case ('medium') {
        <span class="text-sm px-2 py-1 rounded-full bg-yellow-100 text-yellow-700">Medium</span>
      }
      @case ('low') {
        <span class="text-sm px-2 py-1 rounded-full bg-green-100 text-green-700">Low</span>
      }
    }
  </div>

  <p class="text-gray-600 text-sm mb-3">{{ task().description }}</p>

  <div class="flex gap-2">
    <button (click)="toggle.emit(task().id)"
            class="text-sm px-3 py-1 rounded bg-blue-100 text-blue-700 hover:bg-blue-200">
      {{ task().completed ? 'Undo' : 'Complete' }}
    </button>
    <button (click)="delete.emit(task().id)"
            class="text-sm px-3 py-1 rounded bg-red-100 text-red-700 hover:bg-red-200">
      Delete
    </button>
  </div>
</div>
