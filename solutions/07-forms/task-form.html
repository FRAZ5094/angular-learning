<div class="max-w-lg mx-auto">
  <h1 class="text-2xl font-bold text-gray-900 mb-6">Create New Task</h1>

  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-4">
    <!-- Title -->
    <div>
      <label for="title" class="block text-sm font-medium text-gray-700">
        Title
      </label>
      <input
        id="title"
        formControlName="title"
        class="mt-1 block w-full rounded border-gray-300 px-3 py-2 border focus:border-blue-500 focus:ring-1 focus:ring-blue-500"
        placeholder="Enter task title"
      />
      @if (form.get('title')?.invalid && form.get('title')?.touched) {
        <div class="text-red-600 text-sm mt-1">
          @if (form.get('title')?.hasError('required')) {
            Title is required
          } @else if (form.get('title')?.hasError('minlength')) {
            Title must be at least 3 characters
          }
        </div>
      }
    </div>

    <!-- Description -->
    <div>
      <label for="description" class="block text-sm font-medium text-gray-700">
        Description
      </label>
      <textarea
        id="description"
        formControlName="description"
        rows="3"
        class="mt-1 block w-full rounded border-gray-300 px-3 py-2 border focus:border-blue-500 focus:ring-1 focus:ring-blue-500"
        placeholder="Enter task description (optional)"
      ></textarea>
    </div>

    <!-- Priority -->
    <div>
      <label for="priority" class="block text-sm font-medium text-gray-700">
        Priority
      </label>
      <select
        id="priority"
        formControlName="priority"
        class="mt-1 block w-full rounded border-gray-300 px-3 py-2 border focus:border-blue-500 focus:ring-1 focus:ring-blue-500"
      >
        <option value="low">Low</option>
        <option value="medium">Medium</option>
        <option value="high">High</option>
      </select>
    </div>

    <!-- Due Date -->
    <div>
      <label for="dueDate" class="block text-sm font-medium text-gray-700">
        Due Date
      </label>
      <input
        id="dueDate"
        type="date"
        formControlName="dueDate"
        class="mt-1 block w-full rounded border-gray-300 px-3 py-2 border focus:border-blue-500 focus:ring-1 focus:ring-blue-500"
      />
    </div>

    <!-- Submit -->
    <div class="flex gap-3 pt-2">
      <button
        type="submit"
        [disabled]="form.invalid"
        class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed"
      >
        Create Task
      </button>
      <button
        type="button"
        (click)="form.reset()"
        class="bg-gray-100 text-gray-700 px-4 py-2 rounded hover:bg-gray-200"
      >
        Reset
      </button>
    </div>
  </form>
</div>
